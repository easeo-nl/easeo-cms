version: 2
updates:
  - package-ecosystem: "composer"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Europe/Amsterdam"
    allow:
      - dependency-name: "easeo/*"
    reviewers:
      - "{{REVIEWER_HANDLE}}"
      - "{{BACKSTOP_HANDLE}}"
    commit-message:
      prefix: "deps"
    pull-request-branch-name:
      separator: "-"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "easeo-cms"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "github-actions"
