name: CI

on:
  push:
    branches: [main, monorepo-split]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: PHPUnit (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # PHP 8.1 excluded: root composer.json requires php >=8.2
        php: ['8.2', '8.3']
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer:v2
          coverage: none

      - name: Cache composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ matrix.php }}-${{ hashFiles('composer.lock') }}
          restore-keys: composer-${{ matrix.php }}-

      - name: Install dependencies (root)
        run: composer install --no-progress --prefer-dist

      - name: Lint all PHP files in packages/
        run: |
          find packages -name '*.php' -print0 \
            | xargs -0 -n1 -P4 php -l \
            > /dev/null

      - name: Validate composer.json (root)
        run: composer validate --strict

      - name: Run PHPUnit (alle packages + tools)
        run: composer test
